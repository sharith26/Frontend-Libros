<div class="login-container">
  <div class="login-box">
    <h1>Mi biblioteca</h1>
    <p>Inicia sesión para gestionar tus libros</p>

    <form class="login-form">
      <div class="input-group">
        <label>Usuario</label>
        <input type="text" placeholder="Usuario">
      </div>
      
      <div class="input-group">
        <label>Contraseña</label>
        <input type="password" placeholder="••••••••">
      </div>

      <button type="button" class="btn-login" (click)="entrar()">Entrar</button>

      <div class="divider">
        <span>o continúa con</span>
      </div>

      <div class="social-login">
        <button type="button" class="btn-social" (click)="loginConGoogle()">
          Google
        </button>
        <button type="button" class="btn-social" (click)="loginConFacebook()">
          Facebook
        </button>
      </div>
    </form>
  </div>
</div>
