<div class="register-container" style="max-width: 400px; margin: 50px auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px;">
  <h2>Crear Cuenta - Destellos de Tinta</h2>
  <p class="text-muted">Regístrate para gestionar tu biblioteca inteligente</p>

  <div style="margin-bottom: 15px;">
    <label>Nombre de usuario:</label>
    <input type="text" [(ngModel)]="username" class="form-control" placeholder="Ej. SharithDev" style="width: 100%; padding: 8px; margin-top: 5px;">
  </div>

  <div style="margin-bottom: 15px;">
    <label>Correo electrónico:</label>
    <input type="email" [(ngModel)]="email" class="form-control" placeholder="correo@ejemplo.com" style="width: 100%; padding: 8px; margin-top: 5px;">
  </div>

  <div style="margin-bottom: 15px;">
    <label>Contraseña:</label>
    <input type="password" [(ngModel)]="password" class="form-control" placeholder="******" style="width: 100%; padding: 8px; margin-top: 5px;">
  </div>

  <button (click)='sendRegister()' style="width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px;">
    Registrarse
  </button>

  <div *ngIf="errorMessage" style="color: red; font-weight: bold; margin-top: 15px; padding: 10px; border: 1px solid red; background-color: #ffe6e6; border-radius: 4px;">
    ⚠️ {{ errorMessage }}
  </div>

  <div *ngIf="successMessage" style="color: green; font-weight: bold; margin-top: 15px; padding: 10px; border: 1px solid green; background-color: #e6ffe6; border-radius: 4px;">
    ✅ {{ successMessage }}
  </div>

  <div style="margin-top: 20px; text-align: center;">
    <a routerLink="/login" style="color: #007bff; text-decoration: none;">¿Ya tienes una cuenta? Inicia sesión aquí</a>
  </div>
</div>
