<div class="dashboard-hero">

  <div class="hero-content">
    <div class="dash-icon">📊</div>
    <h1>Dashboard</h1>
    <p>Resumen de tu biblioteca personal</p>
  </div>

  <div class="cards-grid">

    <div class="dash-card">
      <span>📚</span>
      <h3>Total de Libros</h3>
      <p>{{ libros.length }}</p>
    </div>

    <div class="dash-card">
      <span>✅</span>
      <h3>Terminados</h3>
      <p>{{ librosTerminados }}</p>
    </div>

    <div class="dash-card">
    <span>📖</span>
    <h3>Leyendo</h3>
    <p>{{ librosLeyendo }}</p>
  </div>

  <div class="dash-card">
    <span>⏳</span>
    <h3>Pendientes</h3>
    <p>{{ librosPendientes }}</p>
  </div>

    <div class="dash-card">
      <span>⭐</span>
      <h3>Promedio Rating</h3>
      <p>{{ promedioRating }}</p>
    </div>

    <div class="dash-card">
      <span>🎭</span>
      <h3>Géneros</h3>
      <p>{{ totalGeneros }}</p>
    </div>

  </div>

</div>
